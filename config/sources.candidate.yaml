# Candidate sources — under evaluation, NOT yet part of the production set.
# Load alongside config/sources.yaml with:  ai-newsletter build --include-candidates
# Sources here are tagged source_set: candidate. In `consensus` mode, a topic that
# is covered by BOTH a main source and a candidate source gets a cross-set bonus,
# which shows which candidates actually corroborate established coverage.
# Promote a proven source by moving its entry into config/sources.yaml.

