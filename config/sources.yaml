# Initial MVP sources. Replace or extend this list after the target site list is finalized.
# Kinds:
#   rss        RSS/Atom feed
#   webpage    Article listing page, best-effort link extraction
#   github     GitHub search API
#   huggingface Hugging Face Hub API

sources:
  - id: openai-news
    name: OpenAI News
    kind: rss
    url: https://openai.com/news/rss.xml
